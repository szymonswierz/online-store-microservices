<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <title>Online Store</title>
</head>

<body>
<div class="container mt-5">

    <div class="text-center mt-5">
        <h1>Welcome to the store!</h1>
        <p class="text-muted">Browse categories, products or search for something specific.</p>
    </div>

    <div class="d-flex justify-content-center gap-3 mb-4">
        <a th:href="@{/dashboard}" class="btn btn-primary">Dashboard</a>
        <a th:href="@{/categories/all}" class="btn btn-primary">All Categories</a>
        <a th:href="@{/products/all}" class="btn btn-primary">All Products</a>
    </div>

    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <form th:action="@{/products/search}" method="GET" class="d-flex gap-2">
                <input type="text" name="phrase" class="form-control" placeholder="Search products">
                <button type="submit" class="btn btn-success">Search</button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
